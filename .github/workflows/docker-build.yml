name: Docker Build and Push

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  WEB_IMAGE_NAME: ${{ github.repository }}-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./rust-backend
            image: ${{ github.repository }}-backend
            name: backend
          - context: ./web
            image: ${{ github.repository }}-web
            name: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            # Tag 'latest' only on the default branch (main)
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag 'dev' on all branches that are NOT the default branch
            type=raw,value=dev,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name != 'pull_request' }}
            # Support semantic versioning tags (v1.0.0, etc)
            type=semver,pattern={{version}}
            # Short SHA tag for every build
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_KEY=admin123
