name: Docker Build and Push

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./rust-backend
            image: ${{ github.repository }}-backend
          - context: ./web
            image: ${{ github.repository }}-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Dieser Schritt ermittelt den exakten Quell-Branch und macht ihn Docker-konform
      - name: Extract branch name
        id: extract_branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          # Ersetzt / und andere Sonderzeichen durch - (wichtig für feature/xyz Branches)
          CLEAN_BRANCH=$(echo "$BRANCH_NAME" | tr '/' '-' | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "branch=$CLEAN_BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            # Nutzt immer den oben extrahierten Branch-Namen als Tag
            type=raw,value=${{ steps.extract_branch.outputs.branch }}
            # Optional: Immer noch den kurzen SHA-Tag mitgeben (gute Praxis)
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          # Pusht bei jedem Push. Bei PRs wird standardmäßig nur gebaut. 
          # Wenn du PRs AUCH pushen willst, ändere das zu: push: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_KEY=admin123
