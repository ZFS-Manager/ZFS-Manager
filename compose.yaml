services:
  zfs-manager:
    build: .
    container_name: zfs-manager
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ZFS_API_PORT=3000
      - RUST_LOG=info
      - ZFS_MANAGER_DATA=/home/docker/zfs-manager
      - ZFS_API_KEY=my-super-secret-key-123
    privileged: true
    volumes:
      - /dev:/dev
      - /proc:/proc
      - /sys/module/zfs:/sys/module/zfs
      - /home/docker/zfs-manager:/home/docker/zfs-manager
    working_dir: /home/docker/zfs-manager
    network_mode: host
