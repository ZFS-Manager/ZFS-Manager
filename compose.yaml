services:
  zfs-backend:
    build:
      context: ./rust-backend
      dockerfile: Dockerfile
    container_name: zfs-backend
    restart: unless-stopped
    ports:
      - "${ZFS_BACKEND_PORT:-3000}:${ZFS_BACKEND_PORT:-3000}"
    environment:
      - ZFS_API_PORT=${ZFS_BACKEND_PORT:-3000}
      - RUST_LOG=info
      - ZFS_MANAGER_DATA=/home/docker/zfs-manager
      - ZFS_API_KEY=${ZFS_PASSWORD:-admin123}
    privileged: true
    volumes:
      - /dev:/dev
      - /proc:/proc
      - /sys/module/zfs:/sys/module/zfs
      - /home/docker/zfs-manager:/home/docker/zfs-manager
    working_dir: /home/docker/zfs-manager
    network_mode: host

  zfs-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_KEY=${ZFS_PASSWORD:-admin123}
    container_name: zfs-web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "${ZFS_WEB_PORT:-8080}:80"
    depends_on:
      - zfs-backend
